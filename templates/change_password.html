<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cambio de Contrasena - ALMEX</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_almex.png', v=cache_bust) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=cache_bust) }}">
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-brand">
        <img class="auth-logo" src="{{ url_for('static', filename='img/logo_almex.png', v=cache_bust) }}" alt="ALMEX">
        <div>
          <h1>Cambio obligatorio</h1>
          <p>{{ username }} ({{ role }}) debe actualizar su contrasena para continuar.</p>
        </div>
      </div>
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('change_password_submit') }}" class="auth-form" autocomplete="off">
        <label>Contrasena actual
          <input type="password" name="current_password" maxlength="128" required autofocus>
        </label>
        <label>Nueva contrasena
          <input type="password" name="new_password" maxlength="128" required>
        </label>
        <label>Confirmar nueva contrasena
          <input type="password" name="confirm_password" maxlength="128" required>
        </label>
        <button type="submit" class="btn btn--primary">Actualizar y continuar</button>
      </form>
      <div class="auth-note">
        Reglas minimas:
        <ul>
          <li>10 caracteres o mas</li>
          <li>Al menos 1 mayuscula, 1 minuscula y 1 numero</li>
          <li>Al menos 1 simbolo</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
