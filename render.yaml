services:
  - type: web
    name: formix-respaldo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app(base_dir='.')"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formix-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: APP_SECRET_KEY
        generateValue: true

databases:
  - name: formix-db
    plan: free
