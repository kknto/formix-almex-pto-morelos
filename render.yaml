services:
  - type: web
    name: formix-respaldo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: APP_SECRET_KEY
        value: Formix#2026!SecretKey
